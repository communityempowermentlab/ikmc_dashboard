version: '3.8'

services:
  client:
    build:
      context: ../client
      dockerfile: ../docker/client.Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000/api

  server:
    build:
      context: ../server
      dockerfile: ../docker/server.Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ../server:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=secret
      - DB_NAME=hospital_dashboard
      - JWT_SECRET=secret
